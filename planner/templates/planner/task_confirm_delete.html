{% extends "planner/base.html" %}

{% block title %}Delete Task — DayFlow{% endblock %}

{% block content %}
<div style="max-width:480px;margin:4rem auto;">
  <div class="card" style="padding:2.5rem;text-align:center;">
    <div style="font-size:3.5rem;margin-bottom:1.25rem;">🗑</div>
    <h1 style="font-size:1.4rem;font-weight:800;margin:0 0 0.5rem;">Delete this task?</h1>
    <p style="color:var(--text-secondary);font-size:0.9rem;margin-bottom:0.5rem;">
      You're about to delete:
    </p>
    <p style="font-size:1rem;font-weight:600;color:var(--text-primary);background:var(--bg-hover);border-radius:10px;padding:0.75rem 1rem;margin-bottom:1.5rem;">
      "{{ object.title }}"
    </p>
    <p style="font-size:0.8rem;color:var(--text-muted);margin-bottom:2rem;">This action cannot be undone.</p>
    <form method="POST" style="display:flex;gap:10px;justify-content:center;">
      {% csrf_token %}
      <button type="submit" style="
        background:var(--red);color:white;border:none;border-radius:10px;
        padding:0.6rem 1.5rem;font-family:'Syne',sans-serif;font-weight:600;
        font-size:0.875rem;cursor:pointer;transition:opacity 0.15s;
      " onmouseover="this.style.opacity=0.85" onmouseout="this.style.opacity=1">
        Yes, Delete
      </button>
      <a href="{% url 'dashboard' %}?date={{ object.date|date:'Y-m-d' }}" class="btn-ghost" style="text-decoration:none;">
        Cancel
      </a>
    </form>
  </div>
</div>
{% endblock %}
